<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ObesityScope · TP Ingeniería</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">⚕</div>
            <div class="logo-text">
                <strong>ObesityScope</strong>
                <span>TP CRISP-DM · UGR</span>
            </div>
        </div>

        <nav class="nav">
            <a href="{{ url_for('home') }}" class="nav-item {% if active == 'home' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Inicio</span>
            </a>
            <a href="{{ url_for('predictor') }}" class="nav-item {% if active == 'predictor' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 11l3 3L22 4"/>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                </svg>
                <span>Predictor</span>
            </a>
            <a href="{{ url_for('analisis') }}" class="nav-item {% if active == 'analisis' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"/>
                    <line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
                <span>Análisis</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="footer-card">
                <div class="footer-label">Modelo</div>
                <div class="footer-value">Random Forest</div>
                <div class="footer-meta">F1-macro 0.788 · 400 árboles</div>
            </div>
        </div>
    </aside>

    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
